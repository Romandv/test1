<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - 经典复刻版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 3px solid #4a4a4a;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 600px;
            background: #000;
            border-radius: 17px;
        }
        
        .game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .ui-left, .ui-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .lives-display {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .life-icon {
            width: 20px;
            height: 20px;
            background: #e74c3c;
            clip-path: polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%);
        }
        
        .power-display {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .power-bar {
            width: 100px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e67e22);
            transition: width 0.3s ease;
        }
        
        .start-screen, .game-over, .level-complete, .victory-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .start-screen h1, .game-over h2, .level-complete h2, .victory-screen h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #f39c12;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        }
        
        .controls-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .controls-info h3 {
            margin-bottom: 15px;
            color: #f39c12;
        }
        
        .controls-info ul {
            list-style: none;
            text-align: left;
        }
        
        .controls-info li {
            margin: 10px 0;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.5);
        }
        
        .game-over, .level-complete, .victory-screen {
            display: none;
        }
        
        .item-info {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        
        .item-icon {
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
        
        .item-health { background: #e74c3c; }
        .item-power { background: #f39c12; }
        .item-pierce { background: #9b59b6; }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-ui">
            <div class="ui-left">
                <div class="lives-display">
                    <span>生命:</span>
                    <div id="livesContainer"></div>
                </div>
                <div class="power-display">
                    <span>火力:</span>
                    <div class="power-bar">
                        <div class="power-fill" id="powerFill"></div>
                    </div>
                </div>
            </div>
            <div class="ui-right">
                <div>关卡: <span id="levelDisplay">1</span>/3</div>
                <div>分数: <span id="scoreDisplay">0</span></div>
                <div>敌人: <span id="enemyCount">0</span></div>
            </div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <h1>坦克大战</h1>
            <div class="controls-info">
                <h3>游戏控制</h3>
                <ul>
                    <li>↑↓←→ 或 WASD - 移动坦克</li>
                    <li>空格键 - 发射炮弹</li>
                    <li>道具说明：</li>
                    <li style="padding-left: 20px;">❤️ 红色 - 生命+1</li>
                    <li style="padding-left: 20px;">⚡ 黄色 - 火力增强</li>
                    <li style="padding-left: 20px;">🔮 紫色 - 穿透炮弹（可破墙）</li>
                </ul>
            </div>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
        
        <div class="level-complete" id="levelComplete">
            <h2>关卡完成!</h2>
            <p>分数: <span id="levelScore">0</span></p>
            <button class="btn" onclick="nextLevel()">下一关</button>
        </div>
        
        <div class="victory-screen" id="victoryScreen">
            <h2>恭喜通关!</h2>
            <p>总分数: <span id="victoryScore">0</span></p>
            <button class="btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

        // 初始化关卡
        function initLevel(levelIndex) {
            const levelData = levels[levelIndex];
            
            // 复制地图
            map = levelData.map.map(row => [...row]);
            
            // 设置玩家位置（左下角安全区域）
            player.x = 60;
            player.y = 540;
            player.direction = 'up';
            player.shootCooldown = 0;
            player.invincible = 0;
            
            // 初始化敌人
            enemies = levelData.enemies.map(e => ({
                ...e,
                width: e.type === 'elite' ? 32 : 28,
                height: e.type === 'elite' ? 32 : 28,
                direction: ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)],
                shootCooldown: 0,
                moveCooldown: 0
            }));
            
            // 初始化道具
            items = levelData.items.map(i => ({...i, width: 20, height: 20}));
            
            // 清空子弹
            bullets = [];
        }
        
        // 键盘事件
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (gameState === 'playing') {
                // 射击
                if (e.key === ' ') {
                    shootBullet(player, true);
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // 发射子弹
        function shootBullet(tank, isPlayer) {
            if (tank.shootCooldown > 0) return;
            
            tank.shootCooldown = isPlayer ? 15 : 30;
            
            const bulletSpeed = 5;
            let vx = 0, vy = 0;
            
            switch (tank.direction) {
                case 'up': vy = -bulletSpeed; break;
                case 'down': vy = bulletSpeed; break;
                case 'left': vx = -bulletSpeed; break;
                case 'right': vx = bulletSpeed; break;
            }
            
            bullets.push({
                x: tank.x + tank.width / 2 - 3,
                y: tank.y + tank.height / 2 - 3,
                width: 6,
                height: 6,
                vx: vx,
                vy: vy,
                isPlayer: isPlayer,
                power: isPlayer ? player.power : 1,
                pierce: isPlayer && player.canPierce
            });
        }
        
        // 更新游戏
        function update() {
            if (gameState !== 'playing') return;
            
            // 玩家移动
            let moveX = 0;
            let moveY = 0;
            
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                moveY = -player.speed;
                player.direction = 'up';
            } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                moveY = player.speed;
                player.direction = 'down';
            } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                moveX = -player.speed;
                player.direction = 'left';
            } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                moveX = player.speed;
                player.direction = 'right';
            }
            
            // 检查碰撞并移动
            if (moveX !== 0 && canMove(player, moveX, 0)) {
                player.x += moveX;
            }
            if (moveY !== 0 && canMove(player, 0, moveY)) {
                player.y += moveY;
            }
            
            // 边界检查
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            
            // 更新冷却
            if (player.shootCooldown > 0) player.shootCooldown--;
            if (player.invincible > 0) player.invincible--;
            
            // 更新敌人
            enemies.forEach(enemy => {
                // 敌人AI移动
                if (enemy.moveCooldown <= 0) {
                    enemy.moveCooldown = 30;
                    enemy.direction = ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)];
                }
                enemy.moveCooldown--;
                
                let enemyMoveX = 0;
                let enemyMoveY = 0;
                
                switch (enemy.direction) {
                    case 'up': enemyMoveY = -enemy.speed; break;
                    case 'down': enemyMoveY = enemy.speed; break;
                    case 'left': enemyMoveX = -enemy.speed; break;
                    case 'right': enemyMoveX = enemy.speed; break;
                }
                
                if (canMove(enemy, enemyMoveX, 0)) {
                    enemy.x += enemyMoveX;
                } else {
                    enemy.direction = ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)];
                }
                
                if (canMove(enemy, 0, enemyMoveY)) {
                    enemy.y += enemyMoveY;
                } else {
                    enemy.direction = ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)];
                }
                
                // 敌人射击
                if (enemy.shootCooldown <= 0 && Math.random() < 0.02) {
                    shootBullet(enemy, false);
                }
                if (enemy.shootCooldown > 0) enemy.shootCooldown--;
            });
            
            // 更新子弹
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                // 检查子弹是否出界
                if (bullet.x < 0 || bullet.x > canvas.width || 
                    bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                    return;
                }
                
                // 检查子弹与地图碰撞
                const tileX = Math.floor((bullet.x + bullet.width / 2) / TILE_SIZE);
                const tileY = Math.floor((bullet.y + bullet.height / 2) / TILE_SIZE);
                
                if (tileY >= 0 && tileY < MAP_HEIGHT && tileX >= 0 && tileX < MAP_WIDTH) {
                    if (map[tileY][tileX] === WALL) {
                        if (bullet.pierce) {
                            map[tileY][tileX] = EMPTY;
                        } else {
                            bullets.splice(index, 1);
                            return;
                        }
                    } else if (map[tileY][tileX] === STEEL && !bullet.pierce) {
                        bullets.splice(index, 1);
                        return;
                    } else if (map[tileY][tileX] === BASE) {
                        gameState = 'gameOver';
                        document.getElementById('gameOver').style.display = 'flex';
                        document.getElementById('finalScore').textContent = score;
                        return;
                    }
                }
                
                // 检查子弹与坦克碰撞
                if (bullet.isPlayer) {
                    enemies.forEach((enemy, enemyIndex) => {
                        if (checkCollision(bullet, enemy)) {
                            enemy.health -= bullet.power;
                            if (!bullet.pierce) {
                                bullets.splice(index, 1);
                            }
                            
                            if (enemy.health <= 0) {
                                enemies.splice(enemyIndex, 1);
                                score += enemy.type === 'elite' ? 50 : 10;
                            }
                        }
                    });
                } else {
                    if (checkCollision(bullet, player) && player.invincible <= 0) {
                        player.lives--;
                        player.invincible = 60;
                        bullets.splice(index, 1);
                        
                        if (player.lives <= 0) {
                            gameState = 'gameOver';
                            document.getElementById('gameOver').style.display = 'flex';
                            document.getElementById('finalScore').textContent = score;
                        }
                    }
                }
            });
            
            // 检查道具收集
            items.forEach((item, index) => {
                if (checkCollision(player, item)) {
                    switch (item.type) {
                        case ITEM_HEALTH:
                            player.lives++;
                            break;
                        case ITEM_POWER:
                            player.power = Math.min(player.maxPower, player.power + 1);
                            break;
                        case ITEM_PIERCE:
                            player.canPierce = true;
                            break;
                    }
                    items.splice(index, 1);
                    score += 20;
                }
            });
            
            // 检查关卡完成
            if (enemies.length === 0) {
                if (level < 3) {
                    gameState = 'levelComplete';
                    document.getElementById('levelComplete').style.display = 'flex';
                    document.getElementById('levelScore').textContent = score;
                } else {
                    gameState = 'victory';
                    document.getElementById('victoryScreen').style.display = 'flex';
                    document.getElementById('victoryScore').textContent = score;
                }
            }
            
            // 更新UI
            updateUI();
        }
        
        // 检查是否可以移动
        function canMove(tank, dx, dy) {
            const newX = tank.x + dx;
            const newY = tank.y + dy;
            
            // 检查地图碰撞
            const left = Math.floor(newX / TILE_SIZE);
            const right = Math.floor((newX + tank.width - 1) / TILE_SIZE);
            const top = Math.floor(newY / TILE_SIZE);
            const bottom = Math.floor((newY + tank.height - 1) / TILE_SIZE);
            
            for (let y = top; y <= bottom; y++) {
                for (let x = left; x <= right; x++) {
                    if (y >= 0 && y < MAP_HEIGHT && x >= 0 && x < MAP_WIDTH) {
                        if (map[y][x] === WALL || map[y][x] === STEEL || map[y][x] === BASE) {
                            return false;
                        }
                    }
                }
            }
            
            return true;
        }
        
        // 检查碰撞
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 绘制游戏
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地图
            for (let y = 0; y < MAP_HEIGHT; y++) {
                for (let x = 0; x < MAP_WIDTH; x++) {
                    const tile = map[y][x];
                    const px = x * TILE_SIZE;
                    const py = y * TILE_SIZE;
                    
                    if (tile === WALL) {
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#A0522D';
                        ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    } else if (tile === STEEL) {
                        ctx.fillStyle = '#708090';
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#778899';
                        ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    } else if (tile === BASE) {
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#FFA500';
                        ctx.beginPath();
                        ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, 8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // 绘制道具
            items.forEach(item => {
                let color, symbol;
                switch (item.type) {
                    case ITEM_HEALTH:
                        color = '#e74c3c';
                        symbol = '❤';
                        break;
                    case ITEM_POWER:
                        color = '#f39c12';
                        symbol = '⚡';
                        break;
                    case ITEM_PIERCE:
                        color = '#9b59b6';
                        symbol = '🔮';
                        break;
                }
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(item.x + item.width / 2, item.y + item.height / 2, 10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(symbol, item.x + item.width / 2, item.y + item.height / 2 + 4);
            });
            
            // 绘制玩家
            if (player.invincible <= 0 || Math.floor(Date.now() / 100) % 2 === 0) {
                drawTank(player.x, player.y, player.width, player.height, player.direction, '#4CAF50', true);
            }
            
            // 绘制敌人
            enemies.forEach(enemy => {
                const color = enemy.type === 'elite' ? '#9C27B0' : '#F44336';
                drawTank(enemy.x, enemy.y, enemy.width, enemy.height, enemy.direction, color, false);
                
                // 绘制血条
                const healthPercent = enemy.health / (enemy.type === 'elite' ? 5 : 1);
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x, enemy.y - 8, enemy.width, 4);
                ctx.fillStyle = healthPercent > 0.5 ? '#4CAF50' : '#F44336';
                ctx.fillRect(enemy.x, enemy.y - 8, enemy.width * healthPercent, 4);
            });
            
            // 绘制子弹
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.isPlayer ? '#FFEB3B' : '#FF5722';
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });
        }
        
        // 绘制坦克
        function drawTank(x, y, width, height, direction, color, isPlayer) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
            
            // 绘制履带
            ctx.fillStyle = '#333';
            ctx.fillRect(x + 2, y + 2, 4, height - 4);
            ctx.fillRect(x + width - 6, y + 2, 4, height - 4);
            
            // 绘制炮塔
            ctx.fillStyle = isPlayer ? '#66BB6A' : '#EF5350';
            ctx.fillRect(x + 6, y + 6, width - 12, height - 12);
            
            // 绘制炮管
            ctx.fillStyle = '#333';
            const barrelLength = 12;
            const barrelWidth = 4;
            let barrelX = x + width / 2 - barrelWidth / 2;
            let barrelY = y + height / 2 - barrelWidth / 2;
            
            switch (direction) {
                case 'up':
                    barrelY -= barrelLength;
                    ctx.fillRect(barrelX, barrelY, barrelWidth, barrelLength);
                    break;
                case 'down':
                    barrelY += barrelLength / 2;
                    ctx.fillRect(barrelX, barrelY, barrelWidth, barrelLength);
                    break;
                case 'left':
                    barrelX -= barrelLength;
                    ctx.fillRect(barrelX, barrelY, barrelLength, barrelWidth);
                    break;
                case 'right':
                    barrelX += barrelLength / 2;
                    ctx.fillRect(barrelX, barrelY, barrelLength, barrelWidth);
                    break;
            }
        }
        
        // 更新UI
        function updateUI() {
            const livesContainer = document.getElementById('livesContainer');
            livesContainer.innerHTML = '';
            for (let i = 0; i < player.lives; i++) {
                const lifeIcon = document.createElement('div');
                lifeIcon.className = 'life-icon';
                livesContainer.appendChild(lifeIcon);
            }
            
            document.getElementById('powerFill').style.width = (player.power / player.maxPower * 100) + '%';
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('enemyCount').textContent = enemies.length;
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState = 'playing';
            score = 0;
            level = 1;
            player.lives = 3;
            player.power = 1;
            player.canPierce = false;
            initLevel(0);
            gameLoop();
        }
        
        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('victoryScreen').style.display = 'none';
            gameState = 'playing';
            score = 0;
            level = 1;
            player.lives = 3;
            player.power = 1;
            player.canPierce = false;
            initLevel(0);
        }
        
        // 下一关
        function nextLevel() {
            document.getElementById('levelComplete').style.display = 'none';
            gameState = 'playing';
            level++;
            initLevel(level - 1);
        }
    </script>
</body>
