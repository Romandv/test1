<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹噬界：幻彩古拉蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 背景动画 */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 40%);
            animation: bgRotate 20s linear infinite;
        }
        
        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .game-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .score-box {
            text-align: center;
        }
        
        .score-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .score-value {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .high-score {
            color: #ffd700;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 50px rgba(120, 119, 198, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .controls-hint {
            margin-top: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .controls-hint span {
            display: inline-block;
            margin: 0 10px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        
        /* 开始/结束界面 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            max-height: 100%;
        }
        
        .overlay h1 {
            font-size: 48px;
            background: linear-gradient(45deg, #ff00cc, #333399, #00ffcc);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 20px;
            text-align: center;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }
        
        .btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(45deg, #ff00cc, #333399);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.5);
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 50px rgba(255, 0, 204, 0.8);
        }
        
        .final-score {
            font-size: 36px;
            color: #00ffcc;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.8);
        }
        
        .girls-day-message {
            font-size: 24px;
            color: #ff69b4;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            font-weight: bold;
            animation: pulse 1s ease-in-out infinite;
            text-align: center;
            line-height: 1.4;
            max-width: 100%;
            word-wrap: break-word;
        }
        
        .message-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
            max-width: 90%;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            border: 3px solid #ff69b4;
            flex-shrink: 0;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 移动端优化 */
        @media (max-width: 600px) {
            .game-container {
                padding: 10px;
            }
            
            .game-header {
                padding: 10px 15px;
            }
            
            .score-value {
                font-size: 24px;
            }
            
            .overlay h1 {
                font-size: 36px;
            }
            
            .controls-hint {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="game-container">
        <div class="game-header">
            <div class="score-box">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高分</div>
                <div class="score-value high-score" id="highScore">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">长度</div>
                <div class="score-value" id="length">3</div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="overlay" id="startScreen">
                <h1>霓虹噬界：幻彩古拉蛇</h1>
                <p>键盘：使用方向键或 WASD 控制<br>手机：滑动屏幕改变方向</p>
                <button class="btn" onclick="startGame()">开始游戏</button>
            </div>
            
            <div class="overlay hidden" id="gameOverScreen">
                <h1>游戏结束</h1>
                <div class="final-score" id="finalScore">0</div>
                <div class="message-container">
                    <img src="images/17b1ee34-c081-4b04-8d77-b0f2f4f91910.png" class="avatar" alt="头像">
                    <div class="girls-day-message">安琪酱真棒！！！女生节快乐！！</div>
                </div>
                <button class="btn" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
        
        <div class="controls-hint">
            <span>↑↓←→</span>
            <span>WASD</span>
            <span>滑动屏幕</span>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const GRID_SIZE = 20;
        const CELL_SIZE = 0; // 动态计算
        let GAME_SPEED = 300;
        
        // 游戏状态
        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let lastRenderTime = 0;
        
        // 蛇的配置 - 在这里配置蛇头图片
        const snakeConfig = {
            // 蛇头图片URL - 可以替换为您自己的图片
            headImage: 'images/17b1ee34-c081-4b04-8d77-b0f2f4f91910.png',
            headColor: '#00ffcc',
            bodyColor: '#ff00cc',
            glowColor: 'rgba(0, 255, 204, 0.5)'
        };
        
        // 加载蛇头图片
        let headImg = null;
        if (snakeConfig.headImage) {
            headImg = new Image();
            headImg.src = snakeConfig.headImage;
        }
        
        // 蛇
        let snake = [];
        let direction = { x: 0, y: -1 };
        let nextDirection = { x: 0, y: -1 };
        
        // 食物
        let food = null;
        let foodType = 'normal'; // normal, bonus, special
        let foodTimer = 0;
        
        // 粒子效果
        let particles = [];
        
        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 键盘控制
            document.addEventListener('keydown', handleKeydown);
            
            // 触摸控制
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            
            // 鼠标控制（用于测试）
            canvas.addEventListener('mousedown', handleMouseDown);
            
            document.getElementById('highScore').textContent = highScore;
        }
        
        // 调整画布大小
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }
        
        // 键盘控制
        function handleKeydown(e) {
            if (gameState !== 'playing') return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        // 触摸开始
        function handleTouchStart(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }
        
        // 触摸结束
        function handleTouchEnd(e) {
            e.preventDefault();
            if (gameState !== 'playing') return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipeDistance = 30;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (Math.abs(dx) > minSwipeDistance) {
                    if (dx > 0 && direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    } else if (dx < 0 && direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                }
            } else {
                // 垂直滑动
                if (Math.abs(dy) > minSwipeDistance) {
                    if (dy > 0 && direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    } else if (dy < 0 && direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                }
            }
        }
        
        // 鼠标控制（将点击位置转换为方向）
        function handleMouseDown(e) {
            if (gameState !== 'playing') return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const dx = x - centerX;
            const dy = y - centerY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction.x === 0) {
                    nextDirection = { x: 1, y: 0 };
                } else if (dx < 0 && direction.x === 0) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                if (dy > 0 && direction.y === 0) {
                    nextDirection = { x: 0, y: 1 };
                } else if (dy < 0 && direction.y === 0) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            gameState = 'playing';
            score = 0;
            
            // 初始化蛇
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX, y: startY + 1 },
                { x: startX, y: startY + 2 }
            ];
            
            direction = { x: 0, y: -1 };
            nextDirection = { x: 0, y: -1 };
            
            // 生成食物
            generateFood();
            
            // 清空粒子
            particles = [];
            
            // 更新UI
            updateUI();
            
            // 开始游戏循环
            lastRenderTime = 0;
            requestAnimationFrame(gameStep);
        }
        
        // 游戏步骤
        function gameStep(currentTime) {
            if (gameState !== 'playing') return;
            
            window.requestAnimationFrame(gameStep);
            
            const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;
            if (secondsSinceLastRender < GAME_SPEED / 1000) return;
            
            lastRenderTime = currentTime;
            
            update();
            draw();
        }
        
        // 更新游戏逻辑
        function update() {
            // 更新方向
            direction = nextDirection;
            
            // 计算新头部位置
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };
            
            // 检查碰撞
            if (checkCollision(newHead)) {
                gameOver();
                return;
            }
            
            // 移动蛇
            snake.unshift(newHead);
            
            // 检查是否吃到食物
            if (food && newHead.x === food.x && newHead.y === food.y) {
                // 吃到食物
                const points = foodType === 'bonus' ? 30 : foodType === 'special' ? 50 : 10;
                score += points;
                
                // 创建粒子效果
                createParticles(food.x, food.y, food.color);
                
                // 加速
                GAME_SPEED = Math.max(50, GAME_SPEED - 2);
                
                // 生成新食物
                generateFood();
                
                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
            } else {
                // 没吃到食物，移除尾部
                snake.pop();
            }
            
            // 更新食物计时器
            if (foodType !== 'normal') {
                foodTimer--;
                if (foodTimer <= 0) {
                    generateFood();
                }
            }
            
            // 更新粒子
            updateParticles();
            
            // 更新UI
            updateUI();
        }
        
        // 检查碰撞
        function checkCollision(head) {
            // 检查墙壁碰撞
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                return true;
            }
            
            // 检查自身碰撞
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 生成食物
        function generateFood() {
            let validPosition = false;
            let attempts = 0;
            
            while (!validPosition && attempts < 100) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                
                validPosition = true;
                
                // 检查是否与蛇重叠
                for (let segment of snake) {
                    if (food.x === segment.x && food.y === segment.y) {
                        validPosition = false;
                        break;
                    }
                }
                
                attempts++;
            }
            
            // 随机食物类型
            const rand = Math.random();
            if (rand < 0.1) {
                foodType = 'special';
                food.color = '#ffd700';
                foodTimer = 100;
            } else if (rand < 0.3) {
                foodType = 'bonus';
                food.color = '#ff6b6b';
                foodTimer = 150;
            } else {
                foodType = 'normal';
                food.color = '#00ff88';
                foodTimer = 0;
            }
        }
        
        // 创建粒子效果
        function createParticles(x, y, color) {
            const cellSize = canvas.width / GRID_SIZE;
            const px = x * cellSize + cellSize / 2;
            const py = y * cellSize + cellSize / 2;
            
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: px,
                    y: py,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }
        
        // 更新粒子
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cellSize = canvas.width / GRID_SIZE;
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            
            // 绘制食物
            if (food) {
                const fx = food.x * cellSize;
                const fy = food.y * cellSize;
                
                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = food.color;
                
                // 食物主体
                ctx.fillStyle = food.color;
                ctx.beginPath();
                ctx.arc(fx + cellSize / 2, fy + cellSize / 2, cellSize / 2 - 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 内部高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(fx + cellSize / 2 - 3, fy + cellSize / 2 - 3, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 特殊食物倒计时
                if (foodType !== 'normal' && foodTimer > 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.ceil(foodTimer / 10), fx + cellSize / 2, fy - 5);
                }
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                const sx = segment.x * cellSize;
                const sy = segment.y * cellSize;
                const isHead = index === 0;
                
                if (isHead && headImg && headImg.complete) {
                    // 绘制图片蛇头（带圆角）
                    ctx.save();
                    ctx.translate(sx + cellSize / 2, sy + cellSize / 2);
                    
                    // 根据方向旋转
                    let angle = 0;
                    if (direction.x === 1) angle = Math.PI / 2;
                    else if (direction.x === -1) angle = -Math.PI / 2;
                    else if (direction.y === 1) angle = Math.PI;
                    
                    ctx.rotate(angle);
                    
                    // 绘制圆角图片
                    const radius = 8;
                    const imgSize = cellSize * 0.9;
                    const offset = (cellSize - imgSize) / 2;
                    
                    ctx.beginPath();
                    ctx.roundRect(-imgSize / 2, -imgSize / 2, imgSize, imgSize, radius);
                    ctx.clip();
                    ctx.drawImage(headImg, -imgSize / 2, -imgSize / 2, imgSize, imgSize);
                    ctx.restore();
                } else {
                    // 绘制渐变蛇身
                    const gradient = ctx.createRadialGradient(
                        sx + cellSize / 2, sy + cellSize / 2, 0,
                        sx + cellSize / 2, sy + cellSize / 2, cellSize / 2
                    );
                    
                    if (isHead) {
                        gradient.addColorStop(0, snakeConfig.headColor);
                        gradient.addColorStop(1, 'rgba(0, 255, 204, 0.3)');
                    } else {
                        const alpha = 1 - (index / snake.length) * 0.5;
                        gradient.addColorStop(0, snakeConfig.bodyColor);
                        gradient.addColorStop(1, `rgba(255, 0, 204, ${alpha * 0.3})`);
                    }
                    
                    // 发光效果
                    ctx.shadowBlur = isHead ? 20 : 10;
                    ctx.shadowColor = isHead ? snakeConfig.headColor : snakeConfig.bodyColor;
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.roundRect(sx + 1, sy + 1, cellSize - 2, cellSize - 2, 5);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    
                    // 蛇头眼睛
                    if (isHead) {
                        ctx.fillStyle = '#fff';
                        const eyeSize = 3;
                        const eyeOffset = 4;
                        
                        if (direction.x !== 0) {
                            ctx.beginPath();
                            ctx.arc(sx + cellSize / 2 + direction.x * eyeOffset, sy + cellSize / 2 - 4, eyeSize, 0, Math.PI * 2);
                            ctx.arc(sx + cellSize / 2 + direction.x * eyeOffset, sy + cellSize / 2 + 4, eyeSize, 0, Math.PI * 2);
                            ctx.fill();
                        } else {
                            ctx.beginPath();
                            ctx.arc(sx + cellSize / 2 - 4, sy + cellSize / 2 + direction.y * eyeOffset, eyeSize, 0, Math.PI * 2);
                            ctx.arc(sx + cellSize / 2 + 4, sy + cellSize / 2 + direction.y * eyeOffset, eyeSize, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            });
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('length').textContent = snake.length;
        }
        
        // 游戏结束
        function gameOver() {
            gameState = 'gameOver';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            
            // 显示/隐藏女生节祝福语和头像（分数达到100分才显示）
            const messageContainer = document.querySelector('.message-container');
            if (score >= 100) {
                messageContainer.style.display = 'flex';
            } else {
                messageContainer.style.display = 'none';
            }
        }
        
        // 重新开始
        function restartGame() {
            startGame();
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
