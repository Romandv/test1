<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人冒险 - 横版过关游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 20px;
        }
        
        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .skill-bar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #4facfe;
        }
        
        .start-screen p {
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }
        
        .controls-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .controls-info h3 {
            margin-bottom: 15px;
            color: #00f2fe;
        }
        
        .controls-info ul {
            list-style: none;
            text-align: left;
        }
        
        .controls-info li {
            margin: 10px 0;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            display: none;
        }
        
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        .level-complete {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 400;
            display: none;
        }
        
        .level-complete h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #4facfe;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-ui">
            <div>
                <div>生命值</div>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill"></div>
                </div>
            </div>
            <div>
                <div>技能能量</div>
                <div class="skill-bar">
                    <div class="skill-fill" id="skillFill"></div>
                </div>
            </div>
            <div>
                <div>关卡: <span id="levelDisplay">1</span></div>
                <div>分数: <span id="scoreDisplay">0</span></div>
            </div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <h1>火柴人冒险</h1>
            <div class="controls-info">
                <h3>游戏控制</h3>
                <ul>
                    <li>↑↓←→ 或 WASD - 移动</li>
                    <li>J - 普通攻击</li>
                    <li>K - 技能攻击 (需要能量)</li>
                    <li>L - 冲刺 (需要能量)</li>
                    <li>空格 - 跳跃</li>
                </ul>
            </div>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
        
        <div class="level-complete" id="levelComplete">
            <h2>关卡完成!</h2>
            <p>分数: <span id="levelScore">0</span></p>
            <button class="btn" onclick="nextLevel()">下一关</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 游戏状态
        let gameState = 'start';
        let score = 0;
        let level = 1;
        let keys = {};
        
        // 玩家对象
        const player = {
            x: 100,
            y: 400,
            width: 30,
            height: 60,
            velocityX: 0,
            velocityY: 0,
            speed: 5,
            jumpPower: -15,
            health: 100,
            maxHealth: 100,
            skillEnergy: 100,
            maxSkillEnergy: 100,
            isJumping: false,
            isAttacking: false,
            attackCooldown: 0,
            facingRight: true
        };
        
        // 敌人数组
        let enemies = [];
        
        // 平台数组
        let platforms = [];
        
        // 关卡配置
        const levels = [
            {
                platforms: [
                    { x: 0, y: 450, width: 1000, height: 50 },
                    { x: 200, y: 350, width: 150, height: 20 },
                    { x: 450, y: 300, width: 150, height: 20 },
                    { x: 700, y: 250, width: 150, height: 20 }
                ],
                enemies: [
                    { x: 300, y: 320, width: 30, height: 60, health: 30, speed: 2 },
                    { x: 550, y: 270, width: 30, height: 60, health: 30, speed: 2 },
                    { x: 800, y: 220, width: 30, height: 60, health: 50, speed: 3 }
                ]
            },
            {
                platforms: [
                    { x: 0, y: 450, width: 1000, height: 50 },
                    { x: 100, y: 380, width: 120, height: 20 },
                    { x: 300, y: 320, width: 120, height: 20 },
                    { x: 500, y: 260, width: 120, height: 20 },
                    { x: 700, y: 200, width: 120, height: 20 },
                    { x: 850, y: 450, width: 150, height: 50 }
                ],
                enemies: [
                    { x: 150, y: 350, width: 30, height: 60, health: 40, speed: 2.5 },
                    { x: 350, y: 290, width: 30, height: 60, health: 40, speed: 2.5 },
                    { x: 550, y: 230, width: 30, height: 60, health: 40, speed: 2.5 },
                    { x: 750, y: 170, width: 30, height: 60, health: 60, speed: 3 },
                    { x: 900, y: 420, width: 30, height: 60, health: 50, speed: 3 }
                ]
            }
        ];
        
        // 初始化关卡
        function initLevel(levelIndex) {
            const levelData = levels[levelIndex % levels.length];
            platforms = levelData.platforms.map(p => ({...p}));
            enemies = levelData.enemies.map(e => ({
                ...e,
                originalX: e.x,
                direction: 1,
                attackCooldown: 0
            }));
            
            player.x = 100;
            player.y = 400;
            player.health = player.maxHealth;
            player.skillEnergy = player.maxSkillEnergy;
        }
        
        // 键盘事件
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (gameState === 'playing') {
                // 跳跃
                if (e.key === ' ' && !player.isJumping) {
                    player.velocityY = player.jumpPower;
                    player.isJumping = true;
                }
                
                // 普通攻击
                if (e.key === 'j' || e.key === 'J') {
                    performAttack('normal');
                }
                
                // 技能攻击
                if ((e.key === 'k' || e.key === 'K') && player.skillEnergy >= 30) {
                    performAttack('skill');
                    player.skillEnergy -= 30;
                }
                
                // 冲刺
                if ((e.key === 'l' || e.key === 'L') && player.skillEnergy >= 20) {
                    performDash();
                    player.skillEnergy -= 20;
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // 普通攻击
        function performAttack(type) {
            if (player.attackCooldown > 0) return;
            
            player.isAttacking = true;
            player.attackCooldown = type === 'normal' ? 20 : 30;
            
            const attackRange = type === 'normal' ? 50 : 100;
            const attackDamage = type === 'normal' ? 10 : 25;
            
            enemies.forEach((enemy, index) => {
                if (isInAttackRange(player, enemy, attackRange)) {
                    enemy.health -= attackDamage;
                    enemy.x += player.facingRight ? 20 : -20;
                    
                    if (enemy.health <= 0) {
                        enemies.splice(index, 1);
                        score += type === 'normal' ? 10 : 25;
                    }
                }
            });
            
            setTimeout(() => {
                player.isAttacking = false;
            }, type === 'normal' ? 200 : 400);
        }
        
        // 冲刺
        function performDash() {
            const dashDistance = player.facingRight ? 100 : -100;
            player.x += dashDistance;
            
            // 边界检查
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        }
        
        // 检测是否在攻击范围内
        function isInAttackRange(attacker, target, range) {
            const attackerCenterX = attacker.x + attacker.width / 2;
            const attackerCenterY = attacker.y + attacker.height / 2;
            const targetCenterX = target.x + target.width / 2;
            const targetCenterY = target.y + target.height / 2;
            
            const distance = Math.sqrt(
                Math.pow(attackerCenterX - targetCenterX, 2) +
                Math.pow(attackerCenterY - targetCenterY, 2)
            );
            
            return distance < range;
        }
        
        // 更新游戏
        function update() {
            if (gameState !== 'playing') return;
            
            // 玩家移动
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.velocityX = -player.speed;
                player.facingRight = false;
            } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.velocityX = player.speed;
                player.facingRight = true;
            } else {
                player.velocityX = 0;
            }
            
            // 重力
            player.velocityY += 0.8;
            
            // 更新位置
            player.x += player.velocityX;
            player.y += player.velocityY;
            
            // 平台碰撞检测
            player.isJumping = true;
            platforms.forEach(platform => {
                if (player.x < platform.x + platform.width &&
                    player.x + player.width > platform.x &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height + 10 &&
                    player.velocityY > 0) {
                    player.y = platform.y - player.height;
                    player.velocityY = 0;
                    player.isJumping = false;
                }
            });
            
            // 边界检查
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            if (player.y > canvas.height) {
                player.health = 0;
            }
            
            // 更新攻击冷却
            if (player.attackCooldown > 0) player.attackCooldown--;
            
            // 恢复技能能量
            if (player.skillEnergy < player.maxSkillEnergy) {
                player.skillEnergy += 0.5;
            }
            
            // 更新敌人
            enemies.forEach(enemy => {
                // 敌人移动
                enemy.x += enemy.speed * enemy.direction;
                
                // 敌人边界检测
                if (enemy.x < enemy.originalX - 100 || enemy.x > enemy.originalX + 100) {
                    enemy.direction *= -1;
                }
                
                // 敌人攻击
                if (enemy.attackCooldown > 0) {
                    enemy.attackCooldown--;
                } else if (isInAttackRange(enemy, player, 30)) {
                    player.health -= 10;
                    enemy.attackCooldown = 60;
                }
            });
            
            // 检测关卡完成
            if (enemies.length === 0) {
                gameState = 'levelComplete';
                document.getElementById('levelComplete').style.display = 'flex';
                document.getElementById('levelScore').textContent = score;
            }
            
            // 检测游戏结束
            if (player.health <= 0) {
                gameState = 'gameOver';
                document.getElementById('gameOver').style.display = 'flex';
                document.getElementById('finalScore').textContent = score;
            }
            
            // 更新UI
            updateUI();
        }
        
        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制平台
            platforms.forEach(platform => {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                
                // 平台草地
                ctx.fillStyle = '#228B22';
                ctx.fillRect(platform.x, platform.y, platform.width, 10);
            });
            
            // 绘制玩家（火柴人）
            drawStickman(player.x, player.y, player.width, player.height, player.facingRight, player.isAttacking);
            
            // 绘制敌人
            enemies.forEach(enemy => {
                drawEnemy(enemy);
            });
        }
        
        // 绘制火柴人
        function drawStickman(x, y, width, height, facingRight, isAttacking) {
            const centerX = x + width / 2;
            const headRadius = width / 3;
            const bodyHeight = height * 0.4;
            const legLength = height * 0.3;
            const armLength = height * 0.25;
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            
            // 头部
            ctx.beginPath();
            ctx.arc(centerX, y + headRadius, headRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // 眼睛
            ctx.fillStyle = '#000';
            const eyeOffset = facingRight ? 3 : -3;
            ctx.beginPath();
            ctx.arc(centerX + eyeOffset, y + headRadius - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 身体
            ctx.beginPath();
            ctx.moveTo(centerX, y + headRadius * 2);
            ctx.lineTo(centerX, y + headRadius * 2 + bodyHeight);
            ctx.stroke();
            
            // 手臂
            ctx.beginPath();
            if (isAttacking) {
                const armEndX = facingRight ? centerX + armLength + 20 : centerX - armLength - 20;
                ctx.moveTo(centerX, y + headRadius * 2 + bodyHeight * 0.3);
                ctx.lineTo(armEndX, y + headRadius * 2 + bodyHeight * 0.3);
                ctx.stroke();
                
                // 攻击效果
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(armEndX, y + headRadius * 2 + bodyHeight * 0.3, 15, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.moveTo(centerX, y + headRadius * 2 + bodyHeight * 0.3);
                ctx.lineTo(facingRight ? centerX + armLength : centerX - armLength, y + headRadius * 2 + bodyHeight * 0.5);
                ctx.stroke();
            }
            
            // 腿
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, y + headRadius * 2 + bodyHeight);
            ctx.lineTo(centerX - legLength * 0.5, y + height);
            ctx.moveTo(centerX, y + headRadius * 2 + bodyHeight);
            ctx.lineTo(centerX + legLength * 0.5, y + height);
            ctx.stroke();
        }
        
        // 绘制敌人
        function drawEnemy(enemy) {
            const centerX = enemy.x + enemy.width / 2;
            const headRadius = enemy.width / 3;
            const bodyHeight = enemy.height * 0.4;
            
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            
            // 头部
            ctx.beginPath();
            ctx.arc(centerX, enemy.y + headRadius, headRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // 愤怒的眼睛
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(centerX - 4, enemy.y + headRadius - 2, 2, 0, Math.PI * 2);
            ctx.arc(centerX + 4, enemy.y + headRadius - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 身体
            ctx.beginPath();
            ctx.moveTo(centerX, enemy.y + headRadius * 2);
            ctx.lineTo(centerX, enemy.y + headRadius * 2 + bodyHeight);
            ctx.stroke();
            
            // 手臂
            ctx.beginPath();
            ctx.moveTo(centerX, enemy.y + headRadius * 2 + bodyHeight * 0.3);
            ctx.lineTo(centerX - 15, enemy.y + headRadius * 2 + bodyHeight * 0.5);
            ctx.moveTo(centerX, enemy.y + headRadius * 2 + bodyHeight * 0.3);
            ctx.lineTo(centerX + 15, enemy.y + headRadius * 2 + bodyHeight * 0.5);
            ctx.stroke();
            
            // 腿
            ctx.beginPath();
            ctx.moveTo(centerX, enemy.y + headRadius * 2 + bodyHeight);
            ctx.lineTo(centerX - 10, enemy.y + enemy.height);
            ctx.moveTo(centerX, enemy.y + headRadius * 2 + bodyHeight);
            ctx.lineTo(centerX + 10, enemy.y + enemy.height);
            ctx.stroke();
            
            // 血条
            const healthPercent = enemy.health / 50;
            ctx.fillStyle = '#333';
            ctx.fillRect(enemy.x - 5, enemy.y - 15, enemy.width + 10, 5);
            ctx.fillStyle = healthPercent > 0.5 ? '#4CAF50' : '#f44336';
            ctx.fillRect(enemy.x - 5, enemy.y - 15, (enemy.width + 10) * healthPercent, 5);
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('healthFill').style.width = (player.health / player.maxHealth * 100) + '%';
            document.getElementById('skillFill').style.width = (player.skillEnergy / player.maxSkillEnergy * 100) + '%';
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('scoreDisplay').textContent = score;
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState = 'playing';
            score = 0;
            level = 1;
            initLevel(0);
            gameLoop();
        }
        
        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            gameState = 'playing';
            score = 0;
            level = 1;
            initLevel(0);
        }
        
        // 下一关
        function nextLevel() {
            document.getElementById('levelComplete').style.display = 'none';
            gameState = 'playing';
            level++;
            initLevel(level - 1);
        }
    </script>
</body>
</html>
