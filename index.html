                </div>
                <div class="mb-6">
                    <label class="block text-gray-dark mb-2">确认密码</label>
                    <input type="password" id="registerConfirmPassword" class="w-full px-4 py-2 border border-gray-light rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>

                    注册
                </button>
            </form>

    <!-- JavaScript -->
    <script>
        // 休闲菜单交互
        document.getElementById('leisureMenuButton').addEventListener('click', function() {
            const leisureMenuContent = document.getElementById('leisureMenuContent');
            const leisureMenuIcon = document.getElementById('leisureMenuIcon');
            
            leisureMenuContent.classList.toggle('hidden');
            leisureMenuIcon.classList.toggle('rotate-180');
        });

        // 登录模态框交互
        const loginModal = document.getElementById('loginModal');
        const loginButton = document.getElementById('loginButton');
        const closeLoginModal = document.getElementById('closeLoginModal');

        loginButton.addEventListener('click', function() {
            loginModal.classList.remove('hidden');
        });

        closeLoginModal.addEventListener('click', function() {
            loginModal.classList.add('hidden');
        });

        // 注册模态框交互
        const registerModal = document.getElementById('registerModal');
        const registerButton = document.getElementById('registerButton');
        const closeRegisterModal = document.getElementById('closeRegisterModal');

        registerButton.addEventListener('click', function() {
            registerModal.classList.remove('hidden');
        });

        closeRegisterModal.addEventListener('click', function() {
            registerModal.classList.add('hidden');
        });

        // 密码加密函数
        function hashPassword(password) {
            return btoa(password); // 简单的Base64编码，实际应用中应使用更安全的加密方式
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            fetch('http://localhost:8003/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('登录成功');
                    loginModal.classList.add('hidden');
                } else {
                    alert('登录失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('登录失败，请稍后重试');
            });
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            fetch('http://localhost:8003/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('注册成功');
                    registerModal.classList.add('hidden');
                } else {
                    alert('注册失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('注册失败，请稍后重试');
            });
        });
    </script>
